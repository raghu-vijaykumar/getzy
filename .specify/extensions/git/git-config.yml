# Git Branching Workflow Extension Configuration
# Copied to .specify/extensions/git/git-config.yml on install

# Branch numbering strategy: "sequential" (001, 002, ...) or "timestamp" (YYYYMMDD-HHMMSS)
branch_numbering: sequential

# Commit message used by `git commit` during repository initialization
init_commit_message: "[Spec Kit] Initial commit"

# Auto-commit before/after core commands.
# Set "default" to enable for all commands, then override per-command.
# Each key can be true/false. Message is customizable per-command.
auto_commit:
  default: false
  push_default: false

  # Checkpoint events — commit + push at each major phase boundary
  after_specify:
    enabled: true
    push: true
    message: "[Checkpoint] Add specification (spec.md)"
  after_clarify:
    enabled: true
    push: true
    message: "[Checkpoint] Clarify specification"
  after_plan:
    enabled: true
    push: true
    message: "[Checkpoint] Add implementation plan (plan.md)"
  after_tasks:
    enabled: true
    push: true
    message: "[Checkpoint] Add task breakdown (tasks.md)"
  after_implement:
    enabled: true
    push: true
    message: "[Checkpoint] Implementation progress"

  # Pre-event safety commits (no push — just save before mutation)
  before_clarify:
    enabled: true
    push: false
    message: "[Checkpoint] Save progress before clarification"
  before_plan:
    enabled: true
    push: false
    message: "[Checkpoint] Save progress before planning"
  before_tasks:
    enabled: true
    push: false
    message: "[Checkpoint] Save progress before task generation"
  before_implement:
    enabled: true
    push: false
    message: "[Checkpoint] Save progress before implementation"
  before_checklist:
    enabled: true
    push: false
    message: "[Checkpoint] Save progress before checklist"
  before_analyze:
    enabled: true
    push: false
    message: "[Checkpoint] Save progress before analysis"
  before_taskstoissues:
    enabled: true
    push: false
    message: "[Checkpoint] Save progress before issue sync"

  # After-events (post-commit + push to remote)
  after_constitution:
    enabled: true
    push: true
    message: "[Checkpoint] Add project constitution"
  after_checklist:
    enabled: true
    push: true
    message: "[Checkpoint] Add checklist"
  after_analyze:
    enabled: true
    push: true
    message: "[Checkpoint] Add analysis report"
  after_taskstoissues:
    enabled: true
    push: true
    message: "[Checkpoint] Sync tasks to issues"
